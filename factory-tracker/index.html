<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流水线管理系统</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== 首页：选择身份 ===== -->
  <div id="screen-home" class="screen active">
    <div class="home-wrap">
      <div class="logo-area">
        <div class="logo-icon">⚙</div>
        <h1>流水线管理</h1>
        <p class="subtitle">选择你的身份进入系统</p>
      </div>
      <div class="role-list">
        <div class="role-card" onclick="App.gotoWorkerLogin()">
          <span class="role-emoji">🔧</span>
          <div>
            <div class="role-name">工人</div>
            <div class="role-desc">记录工序进度</div>
          </div>
          <span class="arrow">→</span>
        </div>
        <div class="role-card" onclick="App.gotoAdminLogin()">
          <span class="role-emoji">📊</span>
          <div>
            <div class="role-name">管理员</div>
            <div class="role-desc">查看实时进度</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 工人登录页 ===== -->
  <div id="screen-worker-login" class="screen">
    <div class="page-wrap">
      <div class="top-bar">
        <button class="back-btn" onclick="App.goto('screen-home')">← 返回</button>
        <h2>工人登录</h2>
      </div>
      <div class="form-group">
        <label>你的姓名</label>
        <input type="text" id="input-worker-name" placeholder="例如：张伟" />
      </div>
      <div class="form-group">
        <label>选择批次</label>
        <select id="select-batch"></select>
      </div>
      <button class="btn-primary" onclick="App.workerLogin()">进入工序页面</button>
    </div>
  </div>

  <!-- ===== 工人操作页 ===== -->
  <div id="screen-worker-ops" class="screen">
    <div class="page-wrap">
      <div class="top-bar">
        <button class="back-btn" onclick="App.goto('screen-worker-login')">← 返回</button>
        <h2>工序操作</h2>
      </div>
      <div class="batch-info-bar" id="worker-batch-info"></div>
      <div id="steps-list"></div>
    </div>
  </div>

  <!-- ===== 管理员登录页 ===== -->
  <div id="screen-admin-login" class="screen">
    <div class="page-wrap">
      <div class="top-bar">
        <button class="back-btn" onclick="App.goto('screen-home')">← 返回</button>
        <h2>管理员登录</h2>
      </div>
      <div class="form-group">
        <label>管理员密码</label>
        <input type="password" id="input-admin-pwd" placeholder="演示密码：1234" />
      </div>
      <button class="btn-primary" onclick="App.adminLogin()">进入管理看板</button>
    </div>
  </div>

  <!-- ===== 管理员看板页 ===== -->
  <div id="screen-admin-dash" class="screen">
    <div class="page-wrap">
      <div class="top-bar">
        <button class="back-btn" onclick="App.goto('screen-home')">← 返回</button>
        <h2>管理看板</h2>
      </div>
      <div class="tab-bar">
        <button class="tab active" id="tab-active" onclick="App.switchTab('active')">进行中</button>
        <button class="tab" id="tab-done" onclick="App.switchTab('done')">已完成</button>
      </div>
      <button class="btn-new-batch" onclick="App.createBatch()">＋ 新建批次</button>
      <div id="admin-batches"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
